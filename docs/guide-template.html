<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="UI Style Pilot 接入使用手册 — 如何将规范、AI Skills 与组件模式接入你的前端项目。"
    />
    <title>接入使用手册 — UI Style Pilot</title>
    <style>
      :root {
        --brand: #005bac;
        --brand-light: #55c4f1;
        --text: #e8eef7;
        --text-muted: #8fa3bf;
        --border: rgba(85, 196, 241, 0.14);
        --glass: rgba(13, 20, 32, 0.72);
        --radius: 16px;
        --font:
          "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Segoe UI",
          system-ui, sans-serif;
        --mono: "SF Mono", "Fira Code", "JetBrains Mono", Consolas, monospace;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--font);
        color: var(--text);
        background: #070b12;
        line-height: 1.7;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0, 91, 172, 0.28), transparent),
          radial-gradient(ellipse 60% 40% at 100% 50%, rgba(85, 196, 241, 0.1), transparent);
        pointer-events: none;
        z-index: 0;
      }

      a {
        color: var(--brand-light);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .wrap {
        position: relative;
        z-index: 1;
        width: min(860px, calc(100% - 40px));
        margin: 0 auto;
      }

      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(16px);
        background: rgba(7, 11, 18, 0.85);
        border-bottom: 1px solid var(--border);
      }

      .nav-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 0;
        gap: 16px;
        width: min(1120px, calc(100% - 40px));
        margin: 0 auto;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 1.05rem;
        color: var(--text);
        text-decoration: none;
      }

      .logo:hover {
        text-decoration: none;
        color: var(--brand-light);
      }

      .logo svg {
        width: 28px;
        height: 28px;
      }

      .nav-links {
        display: flex;
        gap: 20px;
        font-size: 0.9rem;
        color: var(--text-muted);
      }

      .nav-links a {
        color: inherit;
        text-decoration: none;
      }

      .nav-links a:hover,
      .nav-links a.active {
        color: var(--brand-light);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        padding: 10px 18px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 0.9rem;
        background: linear-gradient(135deg, var(--brand), #0078d4);
        color: #fff;
        text-decoration: none;
      }

      .btn:hover {
        text-decoration: none;
        opacity: 0.92;
      }

      main {
        padding: 48px 0 72px;
      }

      .prose {
        padding: 40px 44px;
        border-radius: var(--radius);
        background: var(--glass);
        border: 1px solid var(--border);
        backdrop-filter: blur(12px);
      }

      .prose h1 {
        margin: 0 0 16px;
        font-size: 2rem;
        line-height: 1.25;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #fff 30%, var(--brand-light) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .prose h2 {
        margin: 2.2em 0 0.8em;
        padding-bottom: 0.4em;
        font-size: 1.35rem;
        border-bottom: 1px solid var(--border);
        color: var(--text);
      }

      .prose h3 {
        margin: 1.6em 0 0.6em;
        font-size: 1.1rem;
        color: var(--brand-light);
      }

      .prose h4 {
        margin: 1.2em 0 0.5em;
        font-size: 1rem;
      }

      .prose p,
      .prose li {
        color: #c5d4e8;
      }

      .prose ul,
      .prose ol {
        padding-left: 1.4em;
      }

      .prose li + li {
        margin-top: 0.35em;
      }

      .prose code {
        font-family: var(--mono);
        font-size: 0.88em;
        padding: 0.15em 0.45em;
        border-radius: 6px;
        background: rgba(0, 91, 172, 0.2);
        color: #b8e4ff;
      }

      .prose pre {
        margin: 1.2em 0;
        padding: 18px 20px;
        overflow-x: auto;
        border-radius: 12px;
        background: #0a1018;
        border: 1px solid var(--border);
      }

      .prose pre code {
        padding: 0;
        background: none;
        color: #d4e8ff;
        font-size: 0.85rem;
        line-height: 1.65;
      }

      .prose table {
        width: 100%;
        margin: 1.2em 0;
        border-collapse: collapse;
        font-size: 0.92rem;
      }

      .prose th,
      .prose td {
        padding: 10px 14px;
        border: 1px solid var(--border);
        text-align: left;
      }

      .prose th {
        background: rgba(0, 91, 172, 0.2);
        color: var(--text);
      }

      .prose hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 2em 0;
      }

      .prose strong {
        color: var(--text);
      }

      .prose input[type="checkbox"] {
        margin-right: 0.5em;
        accent-color: var(--brand);
      }

      footer {
        padding: 32px 0;
        border-top: 1px solid var(--border);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.88rem;
      }

      @media (max-width: 720px) {
        .nav-links {
          display: none;
        }

        .prose {
          padding: 28px 22px;
        }

        .prose h1 {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-inner">
        <a class="logo" href="index.html">
          <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <rect width="32" height="32" rx="8" fill="url(#g)" />
            <path
              d="M8 22V10h4.2l3.8 7.2L19.8 10H24v12h-3.4v-7.1l-3.6 7.1h-2.6l-3.6-7.1V22H8z"
              fill="#fff"
            />
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="32" y2="32">
                <stop stop-color="#005BAC" />
                <stop offset="1" stop-color="#55C4F1" />
              </linearGradient>
            </defs>
          </svg>
          UI Style Pilot
        </a>
        <div class="nav-links">
          <a href="index.html">首页</a>
          <a href="adoption-guide.html" class="active">使用手册</a>
          <a href="https://github.com/wanghuanlab/ui-style-pilot" target="_blank" rel="noreferrer"
            >GitHub</a
          >
        </div>
        <a class="btn" href="index.html#start">快速开始</a>
      </div>
    </nav>

    <main class="wrap">
      <article class="prose">{{CONTENT}}</article>
    </main>

    <footer>
      <div class="wrap">
        <p>
          <a href="index.html">返回首页</a>
          ·
          <a href="https://github.com/wanghuanlab/ui-style-pilot/blob/main/ADOPTION_GUIDE.zh-CN.md" target="_blank" rel="noreferrer">Markdown 源文件</a>
          · MIT License
        </p>
      </div>
    </footer>
  </body>
</html>
